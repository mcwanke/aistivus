<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Applications — AIstivus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           #0f0f0f;
      --surface:      #181818;
      --surface-2:    #222222;
      --border:       #2a2a2a;
      --border-focus: #4a4a4a;
      --text:         #e8e6e0;
      --text-muted:   #7a7872;
      --text-dim:     #4a4844;
      --accent:       #c8a96e;
      --accent-dim:   #8a7248;
      --green:        #6a9c6a;
      --red:          #9c6a6a;
      --amber:        #c8a96e;
      --blue:         #6a8a9c;
      --purple:       #8a6a9c;
      --radius:       6px;
      --radius-lg:    12px;
      --mono:         'DM Mono', monospace;
      --serif:        'DM Serif Display', serif;
      --sans:         'DM Sans', sans-serif;
      --transition:   200ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ───────────────────────────────────────────── */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .header-back {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-family: var(--mono);
      text-decoration: none;
      transition: color var(--transition);
    }
    .header-back:hover { color: var(--text-muted); }

    .header-wordmark {
      font-family: var(--serif);
      font-size: 1.5rem;
      color: var(--accent);
      letter-spacing: -0.02em;
      text-decoration: none;
    }

    .header-page {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .header-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background var(--transition);
    }
    .status-dot.ok   { background: var(--green); }
    .status-dot.fail { background: var(--red); }

    /* ── Toolbar ──────────────────────────────────────────── */
    .toolbar {
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      position: sticky;
      top: 61px;
      background: var(--bg);
      z-index: 9;
    }

    .toolbar-count {
      font-size: 0.7rem;
      font-family: var(--mono);
      color: var(--text-dim);
      flex: 1;
    }

    .filter-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 6px 10px;
      outline: none;
      cursor: pointer;
      appearance: none;
    }

    .filter-select:focus { border-color: var(--border-focus); }

    /* ── Status pipeline summary ──────────────────────────── */
    .pipeline {
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }

    .pipeline-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 80px;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity var(--transition);
    }

    .pipeline-stage:hover,
    .pipeline-stage.active { opacity: 1; }

    .pipeline-stage-count {
      font-family: var(--serif);
      font-size: 1.4rem;
      color: var(--accent);
      line-height: 1;
    }

    .pipeline-stage-label {
      font-size: 0.6rem;
      font-family: var(--mono);
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: center;
    }

    .pipeline-divider {
      align-self: center;
      color: var(--text-dim);
      font-size: 0.75rem;
      padding: 0 4px;
    }

    /* ── Table ────────────────────────────────────────────── */
    .table-wrap {
      padding: 24px 32px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      padding: 8px 12px;
      font-size: 0.62rem;
      font-family: var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    thead th:hover { color: var(--text-muted); }

    tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background var(--transition);
    }

    tbody tr:hover { background: var(--surface); }

    tbody td {
      padding: 12px;
      font-size: 0.83rem;
      color: var(--text-muted);
      vertical-align: middle;
    }

    .td-company {
      font-size: 0.65rem;
      font-family: var(--mono);
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
    }

    .td-title {
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.3;
    }

    /* ── Status badges ────────────────────────────────────── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      font-size: 0.68rem;
      font-family: var(--mono);
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      white-space: nowrap;
    }

    .status-badge.draft       { border-color: var(--text-dim); color: var(--text-dim); }
    .status-badge.applied     { border-color: var(--blue);   color: var(--blue); }
    .status-badge.screening   { border-color: var(--amber);  color: var(--amber); }
    .status-badge.interview   { border-color: var(--purple); color: var(--purple); }
    .status-badge.offer       { border-color: var(--green);  color: var(--green); background: rgba(106,156,106,0.08); }
    .status-badge.rejected    { border-color: var(--red);    color: var(--red); }
    .status-badge.ghosted     { border-color: var(--text-dim); color: var(--text-dim); font-style: italic; }
    .status-badge.withdrawn   { border-color: var(--text-dim); color: var(--text-dim); }

    /* ── Stars ────────────────────────────────────────────── */
    .stars {
      color: var(--accent);
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    .stars .empty { color: var(--text-dim); }

    /* ── Score chip ───────────────────────────────────────── */
    .score-chip {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--accent);
    }

    .score-chip.none { color: var(--text-dim); font-style: italic; }

    /* ── Days chip ────────────────────────────────────────── */
    .days-chip {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    /* ── Empty state ──────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 32px;
      color: var(--text-dim);
    }

    .empty-glyph {
      font-family: var(--serif);
      font-size: 3rem;
      opacity: 0.3;
      font-style: italic;
      margin-bottom: 16px;
    }

    .empty-state p {
      font-size: 0.85rem;
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto 16px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #0f0f0f;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 0.82rem;
      font-weight: 500;
      padding: 8px 18px;
      text-decoration: none;
      transition: opacity var(--transition);
    }

    .btn-primary:hover { opacity: 0.85; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

  <header class="header">
    <a href="/" class="header-back">← Home</a>
    <a href="/" class="header-wordmark">AIstivus</a>
    <span class="header-page">Applications</span>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">checking...</span>
    </div>
  </header>

  <!-- Pipeline summary -->
  <div class="pipeline" id="pipeline"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar-count" id="toolbarCount">Loading...</span>
    <select class="filter-select" id="filterStatus" onchange="applyFilters()">
      <option value="">All statuses</option>
      <option value="draft">Draft</option>
      <option value="applied">Applied</option>
      <option value="screening">Screening</option>
      <option value="interview">Interview</option>
      <option value="offer">Offer</option>
      <option value="rejected">Rejected</option>
      <option value="ghosted">Ghosted</option>
      <option value="withdrawn">Withdrawn</option>
    </select>
    <select class="filter-select" id="filterExcitement" onchange="applyFilters()">
      <option value="">All excitement levels</option>
      <option value="5">⭐⭐⭐⭐⭐ only</option>
      <option value="4">⭐⭐⭐⭐ and above</option>
      <option value="3">⭐⭐⭐ and above</option>
    </select>
    <a href="/jobs" class="btn-primary">+ Start from Jobs</a>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div id="tableContainer"></div>
  </div>

  <script>
    let allApplications = [];
    let sortField       = 'apply_date';
    let sortDir         = 'desc';

    // ── Status helpers ─────────────────────────────────────
    const STATUS_ORDER = [
      'draft','applied','screening','interview','offer',
      'rejected','ghosted','withdrawn'
    ];

    function statusClass(s) {
      return (s || 'draft').toLowerCase().replace(/\s+/g, '-');
    }

    function statusLabel(s) {
      if (!s) return 'Draft';
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function renderStars(n) {
      if (!n) return '<span class="stars"><span class="empty">☆☆☆☆☆</span></span>';
      const filled = '★'.repeat(n);
      const empty  = '☆'.repeat(5 - n);
      return `<span class="stars">${filled}<span class="empty">${empty}</span></span>`;
    }

    function daysSince(dateStr) {
      if (!dateStr) return null;
      const d    = new Date(dateStr);
      const now  = new Date();
      const diff = Math.floor((now - d) / (1000 * 60 * 60 * 24));
      return diff;
    }

    function formatDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('en-US',
        { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // ── Load ───────────────────────────────────────────────
    async function loadApplications() {
      try {
        const res  = await fetch('/api/applications');
        allApplications = await res.json();
        renderPipeline();
        applyFilters();
      } catch (err) {
        document.getElementById('tableContainer').innerHTML =
          `<div class="empty-state"><p>Failed to load applications: ${err.message}</p></div>`;
      }
    }

    // ── Pipeline summary ───────────────────────────────────
    function renderPipeline() {
      const counts = {};
      STATUS_ORDER.forEach(s => counts[s] = 0);
      allApplications.forEach(a => {
        const s = (a.application_status || 'draft').toLowerCase();
        if (counts[s] !== undefined) counts[s]++;
      });

      const activeStatuses = STATUS_ORDER.filter(s =>
        !['rejected','ghosted','withdrawn'].includes(s)
      );
      const endStatuses = ['rejected','ghosted','withdrawn'];

      const pipeline = document.getElementById('pipeline');
      const makeStage = (s) => `
        <div class="pipeline-stage" onclick="filterByStatus('${s}')" title="Filter by ${s}">
          <div class="pipeline-stage-count">${counts[s]}</div>
          <div class="pipeline-stage-label">${statusLabel(s)}</div>
        </div>`;

      pipeline.innerHTML =
        activeStatuses.map((s, i) =>
          makeStage(s) + (i < activeStatuses.length - 1
            ? '<div class="pipeline-divider">›</div>' : '')
        ).join('') +
        '<div class="pipeline-divider" style="margin:0 8px">|</div>' +
        endStatuses.map(s => makeStage(s)).join('');
    }

    function filterByStatus(status) {
      document.getElementById('filterStatus').value = status;
      applyFilters();
    }

    // ── Filter + sort ──────────────────────────────────────
    function applyFilters() {
      const statusFilter     = document.getElementById('filterStatus').value;
      const excitementFilter = parseInt(document.getElementById('filterExcitement').value) || 0;

      let filtered = allApplications.filter(a => {
        const matchStatus = !statusFilter ||
          (a.application_status || 'draft').toLowerCase() === statusFilter;
        const matchExcitement = !excitementFilter ||
          (a.excitement_level || 0) >= excitementFilter;
        return matchStatus && matchExcitement;
      });

      // Sort
      filtered.sort((a, b) => {
        let va = a[sortField];
        let vb = b[sortField];
        if (va == null) return 1;
        if (vb == null) return -1;
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (va < vb) return sortDir === 'asc' ? -1 : 1;
        if (va > vb) return sortDir === 'asc' ? 1 : -1;
        return 0;
      });

      renderTable(filtered);
    }

    function setSort(field) {
      if (sortField === field) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortField = field;
        sortDir   = 'desc';
      }
      applyFilters();
    }

    function sortIndicator(field) {
      if (sortField !== field) return '';
      return sortDir === 'asc' ? ' ↑' : ' ↓';
    }

    // ── Render table ───────────────────────────────────────
    function renderTable(apps) {
      const count = document.getElementById('toolbarCount');
      count.textContent = `${apps.length} application${apps.length !== 1 ? 's' : ''}`;

      if (apps.length === 0) {
        document.getElementById('tableContainer').innerHTML = `
          <div class="empty-state">
            <div class="empty-glyph">∅</div>
            <p>No applications yet. Start by evaluating a job and creating an application from the Jobs page.</p>
            <a href="/jobs" class="btn-primary">Go to Jobs →</a>
          </div>`;
        return;
      }

      document.getElementById('tableContainer').innerHTML = `
        <table>
          <thead>
            <tr>
              <th onclick="setSort('company_name')">Company / Role${sortIndicator('company_name')}</th>
              <th onclick="setSort('application_status')">Status${sortIndicator('application_status')}</th>
              <th onclick="setSort('excitement_level')">Excitement${sortIndicator('excitement_level')}</th>
              <th onclick="setSort('score_overall')">Eval Score${sortIndicator('score_overall')}</th>
              <th onclick="setSort('apply_date')">Applied${sortIndicator('apply_date')}</th>
              <th>Days</th>
            </tr>
          </thead>
          <tbody>
            ${apps.map(a => {
              const days  = daysSince(a.apply_date);
              const score = a.score_overall != null
                ? `<span class="score-chip">${parseFloat(a.score_overall).toFixed(1)}</span>`
                : `<span class="score-chip none">—</span>`;

              return `
                <tr onclick="window.location='/applications/${a.id}'">
                  <td>
                    <div class="td-company">${a.company_name || '—'}</div>
                    <div class="td-title">${a.title || '—'}</div>
                  </td>
                  <td>
                    <span class="status-badge ${statusClass(a.application_status)}">
                      ${statusLabel(a.application_status)}
                    </span>
                  </td>
                  <td>${renderStars(a.excitement_level)}</td>
                  <td>${score}</td>
                  <td style="white-space:nowrap">${formatDate(a.apply_date)}</td>
                  <td>
                    <span class="days-chip">
                      ${days != null ? `${days}d` : '—'}
                    </span>
                  </td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>`;
    }

    // ── Health check ───────────────────────────────────────
    async function checkHealth() {
      const dot  = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      try {
        const res  = await fetch('/health');
        const data = await res.json();
        if (data.status === 'ok') {
          dot.className    = 'status-dot ok';
          text.textContent = data.ollama.model;
        } else {
          dot.className    = 'status-dot fail';
          text.textContent = 'degraded';
        }
      } catch {
        dot.className    = 'status-dot fail';
        text.textContent = 'offline';
      }
    }

    checkHealth();
    loadApplications();
  </script>
</body>
</html>
